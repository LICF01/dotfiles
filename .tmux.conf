# Enable RGB colour 
set -sa terminal-overrides ",xterm*:Tc"

# Quick Note
bind-key n split-window -h "nvim ~/scratch/personalNotes.md"
bind-key N split-window -h "nvim ~/scratch/workNotes.md"

# use Vi key bindings in copy mode (Prefix-[)
set-window-option -g mode-keys vi

# use the system clipboard when copy
unbind -T copy-mode-vi Space; #Default for begin-selection
unbind -T copy-mode-vi Enter; #Default for copy-selection

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel --clipboard"

# remap prefix from 'C-b' to 'C-s'
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# split panes using | and -
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"

# reload config file
bind r source-file ~/.tmux.conf


# pane resizing
bind -r C-j resize-pane -D 10
bind -r C-k resize-pane -U 10
bind -r C-h resize-pane -L 10
bind -r C-l resize-pane -R 10

# Move pane to a window
bind j choose-window 'join-pane -h -s "%%"' # horizontally
bind J choose-window 'join-pane -s "%%"' # vertically

# Swap windows with < and >
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Remember path when creating a new window
bind c new-window -c "#{pane_current_path}"

# Enable mouse control 
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# Increase history lines (default 2000)
set-option -g history-limit 5000

# start pane numbering with 1 (better for keyboard)
set -g base-index 1
set -g pane-base-index 1

# renumber windows when they're close
set -g renumber-windows on

### UI CHANGES ###
# statusbar
set -g status-position top

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off
set -g bell-action none


## Tmux Plugin Manager
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'alexwforsythe/tmux-which-key'

# set -g @plugin 'odedlaz/tmux-onedark-theme'
set -g @plugin "janoamaral/tokyo-night-tmux"

## janoamaral/tokyo-night-tmux settings  #########
## Battery Widget
set -g @tokyo-night-tmux_show_battery_widget 1 ## 0 disabled - 1 enabled
set -g @tokyo-night-tmux_battery_name "BAT1"  # some linux distro have 'BAT0'
set -g @tokyo-night-tmux_battery_low_threshold 21 # default

##################################################

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

